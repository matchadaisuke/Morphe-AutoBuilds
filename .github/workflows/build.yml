name: Build and Release APKs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      morphe_tag:
        description: 'Morphe (Official) tag'
        required: false
        default: 'latest'
      anddea_tag:
        description: 'Anddea tag'
        required: false
        default: 'latest'
      piko_tag:
        description: 'Piko tag'
        required: false
        default: 'latest'
      hoo_tag:
        description: 'Hoo-dles tag'
        required: false
        default: 'latest'
      rookie_tag:
        description: 'RookieEnough tag'
        required: false
        default: 'latest'
      tosox_tag:
        description: 'Tosox tag'
        required: false
        default: 'latest'
      yuzu_tag:
        description: 'YuzuMikan404 tag'
        required: false
        default: 'latest'
      dropped_tag:
        description: 'Dropped-Patches tag'
        required: false
        default: 'latest'
      morphe_updated:
        description: 'Whether Morphe (Official) was updated'
        required: false
        default: 'true'
      anddea_updated:
        description: 'Whether Anddea was updated'
        required: false
        default: 'true'
      piko_updated:
        description: 'Whether Piko was updated'
        required: false
        default: 'true'
      hoo_updated:
        description: 'Whether Hoo-dles was updated'
        required: false
        default: 'true'
      rookie_updated:
        description: 'Whether RookieEnough was updated'
        required: false
        default: 'true'
      tosox_updated:
        description: 'Whether Tosox was updated'
        required: false
        default: 'true'
      yuzu_updated:
        description: 'Whether YuzuMikan404 was updated'
        required: false
        default: 'true'
      dropped_updated:
        description: 'Whether Dropped-Patches was updated'
        required: false
        default: 'true'
      reuse_apks_json:
        description: 'JSON map of source -> APK asset URL to reuse (no rebuild needed)'
        required: false
        default: '{}'

jobs:
  download-tools:
    name: Download Build Tools
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.cache-key }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      
      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Downloading Morphe CLI..."
          curl -L "https://github.com/MorpheApp/morphe-cli/releases/latest/download/morphe-cli.jar" \
            -o tools/morphe-cli.jar 2>/dev/null || echo "Morphe CLI download may have failed"
          
          echo "Downloading Morphe Patches..."
          curl -L "https://github.com/MorpheApp/morphe-patches/releases/latest/download/morphe-patches.mpp" \
            -o tools/morphe-patches.mpp 2>/dev/null || echo "Morphe Patches download may have failed"
      
      - name: Download ReVanced Tools (for Anddea)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Downloading Anddea Patches..."
          curl -L "https://github.com/anddea/revanced-patches/releases/latest/download/patches.jar" \
            -o tools/anddea-patches.jar 2>/dev/null || echo "Anddea Patches download may have failed"
      
      - name: Cache Tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: tools/
          key: build-tools-${{ hashFiles('my-patch-config.json', 'arch-config.json') }}
      
      - name: Generate Cache Key
        id: cache-key
        run: echo "cache-key=${{ steps.cache-tools.outputs.cache-key || 'no-cache' }}" >> $GITHUB_OUTPUT

  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Read Patch Config and Filter by Updated Sources
        id: read-matrix
        env:
          UPD_MORPHE:   ${{ github.event.inputs.morphe_updated }}
          UPD_ANDDEA:   ${{ github.event.inputs.anddea_updated }}
          UPD_PIKO:     ${{ github.event.inputs.piko_updated }}
          UPD_HOO:      ${{ github.event.inputs.hoo_updated }}
          UPD_ROOKIE:   ${{ github.event.inputs.rookie_updated }}
          UPD_TOSOX:    ${{ github.event.inputs.tosox_updated }}
          UPD_YUZU:     ${{ github.event.inputs.yuzu_updated }}
          UPD_DROPPED:  ${{ github.event.inputs.dropped_updated }}
        run: |
          # env: + run: is valid; env: + uses: is not (Actions parser error).
          python3 - <<'PYEOF'
          import json, os
          upd = {
            'morphe':          os.environ.get('UPD_MORPHE',  'true'),
            'revanced-anddea': os.environ.get('UPD_ANDDEA',  'true'),
            'piko':            os.environ.get('UPD_PIKO',    'true'),
            'hoo':             os.environ.get('UPD_HOO',     'true'),
            'rookie':          os.environ.get('UPD_ROOKIE',  'true'),
            'tosox':           os.environ.get('UPD_TOSOX',   'true'),
            'yuzu':            os.environ.get('UPD_YUZU',    'true'),
            'dropped':         os.environ.get('UPD_DROPPED', 'true'),
          }
          all_items = json.load(open('./my-patch-config.json'))['patch_list']
          all_true = all(v == 'true' for v in upd.values())
          matrix = all_items if all_true else [i for i in all_items if upd.get(i['source']) == 'true']
          if not matrix:
            print('WARNING: No sources were updated – matrix is empty.')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"matrix={json.dumps(matrix)}\n")
          PYEOF

  build-apps:
    name: Build ${{ matrix.app_name }} with ${{ matrix.source }}
    needs: [download-tools, prepare-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Restore Cached Tools
        uses: actions/cache@v4
        with:
          path: tools/
          key: build-tools-${{ hashFiles('my-patch-config.json', 'arch-config.json') }}
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4
      
      - name: Build APK
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 10))
          python -m src
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"
          if-no-files-found: error

  create-release:
    name: Create Integrated Release
    needs: build-apps
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      
      - name: Download All APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-apks
          if-no-files-found: error
      
      - name: Check if Any APKs Were Built
        id: check-apks
        run: |
          apk_count=$(find ./all-apks -name "*.apk" 2>/dev/null | wc -l)
          echo "Found $apk_count APK(s)"
          
          if [ $apk_count -eq 0 ]; then
            echo "No APKs were built successfully"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "$apk_count APK(s) ready for release"
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Collect All APKs
        if: steps.check-apks.outputs.skip_release == 'false'
        run: |
          mkdir -p ./release-apks
          echo "Collecting APKs..."
          find ./all-apks -name "*.apk" -exec cp {} ./release-apks/ \;
          echo "APKs ready for release:"
          ls -la ./release-apks/
          final_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")
          echo "Total APKs: $final_count"
      
      - name: Generate Release Tag (JST)
        if: steps.check-apks.outputs.skip_release == 'false'
        id: tag
        run: |
          jst_time=$(TZ=Asia/Tokyo date +'%Y-%m-%d_%H-%M-JST')
          echo "release_tag=$jst_time" >> $GITHUB_OUTPUT
          echo "Release tag: $jst_time"
      
      - name: Download Reused APKs (sources not rebuilt this run)
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REUSE_JSON: ${{ github.event.inputs.reuse_apks_json }}
        run: |
          mkdir -p ./release-apks
          if [ -z "$REUSE_JSON" ] || [ "$REUSE_JSON" = "{}" ]; then
            echo "No APKs to reuse."
            exit 0
          fi
          echo "$REUSE_JSON" | python3 -c "
          import json, sys, subprocess, os
          data = json.load(sys.stdin)
          for source, url in data.items():
              print(f'Downloading reused APK for {source}: {url}')
              fname = url.split('/')[-1]
              subprocess.run(['curl', '-sL', '-H', f'Authorization: token {os.environ[\"GITHUB_TOKEN\"]}',
                              url, '-o', f'./release-apks/{fname}'], check=False)
          "

      - name: Generate Release Notes
        if: steps.check-apks.outputs.skip_release == 'false'
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --- Resolve all source tags (never show "latest" as-is) ---
          resolve_tag() {
            local repo="$1" fallback="$2"
            gh api "repos/${repo}/releases?per_page=1" --jq '.[0].tag_name' 2>/dev/null || echo "$fallback"
          }

          morphe_tag=$(resolve_tag "MorpheApp/morphe-patches"         "${{ github.event.inputs.morphe_tag }}")
          anddea_tag=$(resolve_tag "anddea/revanced-patches"           "${{ github.event.inputs.anddea_tag }}")
          piko_tag=$(resolve_tag   "crimera/piko"                      "${{ github.event.inputs.piko_tag }}")
          hoo_tag=$(resolve_tag    "hoo-dles/morphe-patches"           "${{ github.event.inputs.hoo_tag }}")
          rookie_tag=$(resolve_tag "RookieEnough/De-ReVanced"          "${{ github.event.inputs.rookie_tag }}")
          tosox_tag=$(resolve_tag  "Tosox/revanced-patches"            "${{ github.event.inputs.tosox_tag }}")
          yuzu_tag=$(resolve_tag   "YuzuMikan404/linegms-fork-second-" "${{ github.event.inputs.yuzu_tag }}")
          dropped_tag=$(resolve_tag "indrastorms/Dropped-Patches"      "${{ github.event.inputs.dropped_tag }}")

          morphe_updated="${{ github.event.inputs.morphe_updated }}"
          anddea_updated="${{ github.event.inputs.anddea_updated }}"
          piko_updated="${{ github.event.inputs.piko_updated }}"
          hoo_updated="${{ github.event.inputs.hoo_updated }}"
          rookie_updated="${{ github.event.inputs.rookie_updated }}"
          tosox_updated="${{ github.event.inputs.tosox_updated }}"
          yuzu_updated="${{ github.event.inputs.yuzu_updated }}"
          dropped_updated="${{ github.event.inputs.dropped_updated }}"

          jst_time=$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')

          # Helper: map filename -> friendly app name
          get_app_name() {
            local f="$1"
            case "$f" in
              *youtube-music*)   echo "YouTube Music" ;;
              *youtube*)         echo "YouTube" ;;
              *instagram*)       echo "Instagram" ;;
              *prime-video*)     echo "Prime Video" ;;
              *duolingo*)        echo "Duolingo" ;;
              *ibs_paint*)       echo "ibis Paint X" ;;
              *icon-packer*)     echo "Icon Packer" ;;
              *nova*)            echo "Nova Launcher" ;;
              *proton-vpn*)      echo "Proton VPN" ;;
              *proton-mail*)     echo "Proton Mail" ;;
              *smart_launcher*)  echo "Smart Launcher" ;;
              *soundcloud*)      echo "SoundCloud" ;;
              *wps-office*)      echo "WPS Office" ;;
              *mega*)            echo "MEGA" ;;
              *yuucho-tsucho*)   echo "ゆうちょ通帳アプリ" ;;
              *yuucho-ninsho*)   echo "ゆうちょ認証アプリ" ;;
              *disney-plus*)     echo "Disney+" ;;
              *crunchyroll*)     echo "Crunchyroll" ;;
              *adguard*)         echo "AdGuard" ;;
              *tasker*)          echo "Tasker" ;;
              *photomath*)       echo "Photomath" ;;
              *pixiv*)           echo "pixiv" ;;
              *)                 echo "$(basename "$f" .apk | sed 's/-arm64.*//' | sed 's/-universal.*//')" ;;
            esac
          }

          # Helper: map filename -> patch source label and version
          get_patch_info() {
            local f="$1"
            case "$f" in
              *-morphe-v*|*-morphe-patches-*)  echo "Official Morphe|$morphe_tag" ;;
              *-revanced-anddea-*)              echo "Anddea|$anddea_tag" ;;
              *-piko-patches-*|*-piko-v*)       echo "Piko (crimera)|$piko_tag" ;;
              *-morphe-patches-hoo-*|*-hoo-*)   echo "Hoo-dles|$hoo_tag" ;;
              *-rookie-*|*De-ReVanced-*)        echo "RookieEnough|$rookie_tag" ;;
              *-tosox-*|*-revanced-patches-*)   echo "Tosox|$tosox_tag" ;;
              *-yuzu-*)                         echo "YuzuMikan404|$yuzu_tag" ;;
              *-dropped-*)                      echo "Dropped-Patches|$dropped_tag" ;;
              *)                                echo "Unknown|unknown" ;;
            esac
          }

          {
            echo "## Morphe AutoBuilds - $jst_time"
            echo ""
            echo "## APK List"
            echo ""
            echo "| Filename | App | APK Version | Patch Source | Patch Version |"
            echo "| --- | --- | --- | --- | --- |"

            for apk in ./release-apks/*.apk; do
              [ -f "$apk" ] || continue
              filename=$(basename "$apk")
              app=$(get_app_name "$filename")
              apk_version=$(echo "$filename" | grep -oP '(?<=-v)\d+[\d.]+(?=[^/]*\.apk)' | tail -1)
              patch_info=$(get_patch_info "$filename")
              source_label="${patch_info%%|*}"
              patch_ver="${patch_info##*|}"
              echo "| $filename | $app | ${apk_version:-N/A} | $source_label | $patch_ver |"
            done

            echo ""
            echo "## Patch Versions"
            echo ""
            echo "| Patch Source | Version | Status |"
            echo "| --- | --- | --- |"

            emit_patch_row() {
              local label="$1" tag="$2" updated="$3"
              if [ "$updated" = "true" ]; then
                echo "| $label | $tag | 🆕 Updated |"
              else
                echo "| $label | $tag | ✅ No changes (reused last build) |"
              fi
            }

            emit_patch_row "Official Morphe"  "$morphe_tag"  "$morphe_updated"
            emit_patch_row "Anddea"            "$anddea_tag"  "$anddea_updated"
            emit_patch_row "Piko (crimera)"    "$piko_tag"    "$piko_updated"
            emit_patch_row "Hoo-dles"          "$hoo_tag"     "$hoo_updated"
            emit_patch_row "RookieEnough"      "$rookie_tag"  "$rookie_updated"
            emit_patch_row "Tosox"             "$tosox_tag"   "$tosox_updated"
            emit_patch_row "YuzuMikan404"      "$yuzu_tag"    "$yuzu_updated"
            emit_patch_row "Dropped-Patches"   "$dropped_tag" "$dropped_updated"

            echo ""
            echo "## Patch Sources"
            echo ""
            echo "- **Official Morphe**: https://github.com/MorpheApp/morphe-patches/releases/tag/$morphe_tag"
            echo "- **Anddea**: https://github.com/anddea/revanced-patches/releases/tag/$anddea_tag"
            echo "- **Piko (crimera)**: https://github.com/crimera/piko/releases/tag/$piko_tag"
            echo "- **Hoo-dles**: https://github.com/hoo-dles/morphe-patches/releases/tag/$hoo_tag"
            echo "- **RookieEnough**: https://github.com/RookieEnough/De-ReVanced/releases/tag/$rookie_tag"
            echo "- **Tosox**: https://github.com/Tosox/revanced-patches/releases/tag/$tosox_tag"
            echo "- **YuzuMikan404**: https://github.com/YuzuMikan404/linegms-fork-second-/releases/tag/$yuzu_tag"
            echo "- **Dropped-Patches**: https://github.com/indrastorms/Dropped-Patches/releases/tag/$dropped_tag"
            echo ""
            echo "## Notes"
            echo ""
            echo "- All APKs are arm64-v8a architecture only"
            echo "- Uninstall existing app before installation"
            echo "- These APKs are auto-built. Use at your own risk."
          } > release_notes.md

          echo "Release notes generated"
      
      - name: Create Release
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ steps.tag.outputs.release_tag }}"
          
          echo "Creating release: $release_tag"
          
          # Delete existing release/tag with the same name if it exists, then recreate
          gh release delete "$release_tag" --yes 2>/dev/null || true
          git push --delete origin "refs/tags/$release_tag" 2>/dev/null || true

          gh release create "$release_tag" \
            --title "Morphe AutoBuilds $release_tag" \
            --notes-file release_notes.md \
            ./release-apks/*.apk
          
          echo "Release created successfully!"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$release_tag"
      
      - name: Display Release Summary
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ steps.tag.outputs.release_tag }}"
          
          echo "Release Summary:"
          echo "  Tag: $release_tag"
          echo "  APKs:"
          ls -1 ./release-apks/*.apk | sed 's/^/    - /'
          echo ""
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/$release_tag"
