name: Check Upstream for Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check All Upstream Patch Sources
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Fetch latest tags for every patch source
      # All outputs written to GITHUB_OUTPUT as <src>_tag=<value>
      # ---------------------------------------------------------------
      - name: Fetch Latest Tags
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          fetch_tag() {
            gh api "repos/${1}/releases?per_page=1" --jq '.[0].tag_name' 2>/dev/null || echo ""
          }

          morphe_tag=$(fetch_tag  "MorpheApp/morphe-patches")
          anddea_tag=$(fetch_tag  "anddea/revanced-patches")
          piko_tag=$(fetch_tag    "crimera/piko")
          hoo_tag=$(fetch_tag     "hoo-dles/morphe-patches")
          rookie_tag=$(fetch_tag  "RookieEnough/De-ReVanced")
          tosox_tag=$(fetch_tag   "Tosox/revanced-patches")
          yuzu_tag=$(fetch_tag    "YuzuMikan404/linegms-fork-second-")
          dropped_tag=$(fetch_tag "indrastorms/Dropped-Patches")

          for var in morphe anddea piko hoo rookie tosox yuzu dropped; do
            eval "tag=\${${var}_tag}"
            [ -z "$tag" ] && echo "⚠️  Could not fetch tag for: $var" || echo "✅ $var: $tag"
            echo "${var}_tag=${tag}" >> $GITHUB_OUTPUT
          done

      # ---------------------------------------------------------------
      # Compare fetched tags against last-tags.json.
      # Outputs: <src>_updated=true|false  and  any_updated=true|false
      # NOTE: ${{ steps.fetch.outputs.X }} are expanded statically by
      #       Actions before the shell runs, so we pass them as env vars
      #       and read them inside the shell script instead.
      # ---------------------------------------------------------------
      - name: Compare with Previous Tags
        id: compare
        env:
          FETCH_MORPHE:  ${{ steps.fetch.outputs.morphe_tag }}
          FETCH_ANDDEA:  ${{ steps.fetch.outputs.anddea_tag }}
          FETCH_PIKO:    ${{ steps.fetch.outputs.piko_tag }}
          FETCH_HOO:     ${{ steps.fetch.outputs.hoo_tag }}
          FETCH_ROOKIE:  ${{ steps.fetch.outputs.rookie_tag }}
          FETCH_TOSOX:   ${{ steps.fetch.outputs.tosox_tag }}
          FETCH_YUZU:    ${{ steps.fetch.outputs.yuzu_tag }}
          FETCH_DROPPED: ${{ steps.fetch.outputs.dropped_tag }}
        run: |
          load_last() {
            [ -f "last-tags.json" ] && jq -r ".${1} // \"\"" last-tags.json || echo ""
          }

          any_updated=false

          check_src() {
            local src="$1" cur="$2"
            local prev
            prev=$(load_last "$src")

            if [ -z "$cur" ]; then
              echo "${src}_updated=false" >> $GITHUB_OUTPUT
              echo "⚠️  $src: fetch failed, skipping"
            elif [ "$cur" != "$prev" ]; then
              any_updated=true
              echo "${src}_updated=true" >> $GITHUB_OUTPUT
              echo "🆕 $src updated: $prev -> $cur"
            else
              echo "${src}_updated=false" >> $GITHUB_OUTPUT
              echo "⏸️  $src unchanged: $cur"
            fi
          }

          check_src morphe  "$FETCH_MORPHE"
          check_src anddea  "$FETCH_ANDDEA"
          check_src piko    "$FETCH_PIKO"
          check_src hoo     "$FETCH_HOO"
          check_src rookie  "$FETCH_ROOKIE"
          check_src tosox   "$FETCH_TOSOX"
          check_src yuzu    "$FETCH_YUZU"
          check_src dropped "$FETCH_DROPPED"

          echo "any_updated=$any_updated" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------------
      # Build a JSON map of APK asset URLs for sources NOT updated,
      # so build.yml can reuse previous APKs instead of rebuilding.
      # ---------------------------------------------------------------
      - name: Collect Reusable APK URLs from Last Release
        id: reuse
        if: steps.compare.outputs.any_updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPD_MORPHE:   ${{ steps.compare.outputs.morphe_updated }}
          UPD_ANDDEA:   ${{ steps.compare.outputs.anddea_updated }}
          UPD_PIKO:     ${{ steps.compare.outputs.piko_updated }}
          UPD_HOO:      ${{ steps.compare.outputs.hoo_updated }}
          UPD_ROOKIE:   ${{ steps.compare.outputs.rookie_updated }}
          UPD_TOSOX:    ${{ steps.compare.outputs.tosox_updated }}
          UPD_YUZU:     ${{ steps.compare.outputs.yuzu_updated }}
          UPD_DROPPED:  ${{ steps.compare.outputs.dropped_updated }}
        run: |
          assets_json=$(gh api "repos/${{ github.repository }}/releases?per_page=1" \
            --jq '.[0].assets // []' 2>/dev/null || echo "[]")

          reuse_map="{}"

          maybe_reuse() {
            local src="$1" updated="$2" pattern="$3"
            if [ "$updated" = "false" ]; then
              url=$(echo "$assets_json" | jq -r \
                --arg pat "$pattern" \
                '.[] | select(.name | test($pat; "i")) | .browser_download_url' \
                2>/dev/null | head -1)
              if [ -n "$url" ]; then
                reuse_map=$(echo "$reuse_map" | jq --arg k "$src" --arg v "$url" '.[$k]=$v')
                echo "  Reuse $src: $url"
              fi
            fi
          }

          maybe_reuse morphe  "$UPD_MORPHE"   "-morphe-v"
          maybe_reuse anddea  "$UPD_ANDDEA"   "revanced-anddea"
          maybe_reuse piko    "$UPD_PIKO"     "-piko"
          maybe_reuse hoo     "$UPD_HOO"      "-hoo"
          maybe_reuse rookie  "$UPD_ROOKIE"   "-rookie"
          maybe_reuse tosox   "$UPD_TOSOX"    "-tosox"
          maybe_reuse yuzu    "$UPD_YUZU"     "-yuzu"
          maybe_reuse dropped "$UPD_DROPPED"  "-dropped"

          echo "reuse_map=$reuse_map" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------------
      # Trigger build only when at least one source was updated
      # ---------------------------------------------------------------
      - name: Trigger Build if Updates Found
        if: steps.compare.outputs.any_updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Triggering build workflow..."

          gh workflow run build.yml \
            -f morphe_tag="${{ steps.fetch.outputs.morphe_tag }}" \
            -f anddea_tag="${{ steps.fetch.outputs.anddea_tag }}" \
            -f piko_tag="${{ steps.fetch.outputs.piko_tag }}" \
            -f hoo_tag="${{ steps.fetch.outputs.hoo_tag }}" \
            -f rookie_tag="${{ steps.fetch.outputs.rookie_tag }}" \
            -f tosox_tag="${{ steps.fetch.outputs.tosox_tag }}" \
            -f yuzu_tag="${{ steps.fetch.outputs.yuzu_tag }}" \
            -f dropped_tag="${{ steps.fetch.outputs.dropped_tag }}" \
            -f morphe_updated="${{ steps.compare.outputs.morphe_updated }}" \
            -f anddea_updated="${{ steps.compare.outputs.anddea_updated }}" \
            -f piko_updated="${{ steps.compare.outputs.piko_updated }}" \
            -f hoo_updated="${{ steps.compare.outputs.hoo_updated }}" \
            -f rookie_updated="${{ steps.compare.outputs.rookie_updated }}" \
            -f tosox_updated="${{ steps.compare.outputs.tosox_updated }}" \
            -f yuzu_updated="${{ steps.compare.outputs.yuzu_updated }}" \
            -f dropped_updated="${{ steps.compare.outputs.dropped_updated }}" \
            -f reuse_apks_json="${{ steps.reuse.outputs.reuse_map }}"

          echo "✅ Build workflow triggered"

      # ---------------------------------------------------------------
      # Persist updated tags to last-tags.json (updated sources only)
      # ---------------------------------------------------------------
      - name: Update Last Tags File
        if: steps.compare.outputs.any_updated == 'true'
        env:
          UPD_MORPHE:   ${{ steps.compare.outputs.morphe_updated }}
          UPD_ANDDEA:   ${{ steps.compare.outputs.anddea_updated }}
          UPD_PIKO:     ${{ steps.compare.outputs.piko_updated }}
          UPD_HOO:      ${{ steps.compare.outputs.hoo_updated }}
          UPD_ROOKIE:   ${{ steps.compare.outputs.rookie_updated }}
          UPD_TOSOX:    ${{ steps.compare.outputs.tosox_updated }}
          UPD_YUZU:     ${{ steps.compare.outputs.yuzu_updated }}
          UPD_DROPPED:  ${{ steps.compare.outputs.dropped_updated }}
          TAG_MORPHE:   ${{ steps.fetch.outputs.morphe_tag }}
          TAG_ANDDEA:   ${{ steps.fetch.outputs.anddea_tag }}
          TAG_PIKO:     ${{ steps.fetch.outputs.piko_tag }}
          TAG_HOO:      ${{ steps.fetch.outputs.hoo_tag }}
          TAG_ROOKIE:   ${{ steps.fetch.outputs.rookie_tag }}
          TAG_TOSOX:    ${{ steps.fetch.outputs.tosox_tag }}
          TAG_YUZU:     ${{ steps.fetch.outputs.yuzu_tag }}
          TAG_DROPPED:  ${{ steps.fetch.outputs.dropped_tag }}
        run: |
          echo "📝 Updating last-tags.json..."
          current=$([ -f "last-tags.json" ] && cat last-tags.json || echo "{}")

          update_if_changed() {
            local key="$1" updated="$2" tag="$3"
            if [ "$updated" = "true" ] && [ -n "$tag" ]; then
              current=$(echo "$current" | jq --arg k "$key" --arg v "$tag" '.[$k]=$v')
            fi
          }

          update_if_changed morphe  "$UPD_MORPHE"   "$TAG_MORPHE"
          update_if_changed anddea  "$UPD_ANDDEA"   "$TAG_ANDDEA"
          update_if_changed piko    "$UPD_PIKO"     "$TAG_PIKO"
          update_if_changed hoo     "$UPD_HOO"      "$TAG_HOO"
          update_if_changed rookie  "$UPD_ROOKIE"   "$TAG_ROOKIE"
          update_if_changed tosox   "$UPD_TOSOX"    "$TAG_TOSOX"
          update_if_changed yuzu    "$UPD_YUZU"     "$TAG_YUZU"
          update_if_changed dropped "$UPD_DROPPED"  "$TAG_DROPPED"

          echo "$current" | jq '.' > last-tags.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-tags.json
          git commit -m "chore: update last-tags [skip ci]"
          git push

          echo "✅ last-tags.json updated and pushed"

      - name: Log – No Updates Found
        if: steps.compare.outputs.any_updated == 'false'
        run: |
          echo "📭 No updates found across all sources. Skipping build."
          cat last-tags.json 2>/dev/null || echo "(last-tags.json not yet created)"
