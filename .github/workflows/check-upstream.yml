name: Check Upstream for Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check Morphe and Anddea Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Get Latest Morphe Tag
        id: morphe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # /releases/latest excludes pre-releases; use /releases?per_page=1 instead
          morphe_tag=$(gh api "repos/MorpheApp/morphe-patches/releases?per_page=1" --jq '.[0].tag_name' 2>/dev/null || echo "")
          
          if [ -z "$morphe_tag" ]; then
            echo "❌ Failed to fetch Morphe tag"
            exit 1
          fi
          
          echo "morphe_tag=$morphe_tag" >> $GITHUB_OUTPUT
          echo "✅ Morphe latest tag: $morphe_tag"
      
      - name: Get Latest Anddea Tag
        id: anddea
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # /releases/latest excludes pre-releases; use /releases?per_page=1 instead
          anddea_tag=$(gh api "repos/anddea/revanced-patches/releases?per_page=1" --jq '.[0].tag_name' 2>/dev/null || echo "")
          
          if [ -z "$anddea_tag" ]; then
            echo "❌ Failed to fetch Anddea tag"
            exit 1
          fi
          
          echo "anddea_tag=$anddea_tag" >> $GITHUB_OUTPUT
          echo "✅ Anddea latest tag: $anddea_tag"
      
      - name: Compare with Previous Tags
        id: compare
        run: |
          morphe_tag="${{ steps.morphe.outputs.morphe_tag }}"
          anddea_tag="${{ steps.anddea.outputs.anddea_tag }}"
          
          # Read previous tags from committed file
          last_morphe_tag=""
          last_anddea_tag=""
          if [ -f "last-tags.json" ]; then
            last_morphe_tag=$(jq -r '.morphe // ""' last-tags.json)
            last_anddea_tag=$(jq -r '.anddea // ""' last-tags.json)
          fi
          
          echo "Current Morphe: $morphe_tag (Previous: $last_morphe_tag)"
          echo "Current Anddea: $anddea_tag (Previous: $last_anddea_tag)"
          
          morphe_updated=false
          anddea_updated=false
          
          if [ "$morphe_tag" != "$last_morphe_tag" ]; then
            morphe_updated=true
            echo "✅ Morphe has been updated"
          else
            echo "⏸️ Morphe has not changed"
          fi
          
          if [ "$anddea_tag" != "$last_anddea_tag" ]; then
            anddea_updated=true
            echo "✅ Anddea has been updated"
          else
            echo "⏸️ Anddea has not changed"
          fi
          
          echo "morphe_updated=$morphe_updated" >> $GITHUB_OUTPUT
          echo "anddea_updated=$anddea_updated" >> $GITHUB_OUTPUT
          echo "morphe_tag=$morphe_tag" >> $GITHUB_OUTPUT
          echo "anddea_tag=$anddea_tag" >> $GITHUB_OUTPUT
      
      - name: Trigger Build if Updates Found
        if: steps.compare.outputs.morphe_updated == 'true' || steps.compare.outputs.anddea_updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          morphe_tag="${{ steps.compare.outputs.morphe_tag }}"
          anddea_tag="${{ steps.compare.outputs.anddea_tag }}"
          morphe_updated="${{ steps.compare.outputs.morphe_updated }}"
          anddea_updated="${{ steps.compare.outputs.anddea_updated }}"
          
          echo "🚀 Triggering build workflow..."
          
          gh workflow run build.yml \
            -f morphe_tag="$morphe_tag" \
            -f anddea_tag="$anddea_tag" \
            -f morphe_updated="$morphe_updated" \
            -f anddea_updated="$anddea_updated"
          
          echo "✅ Build workflow triggered"
      
      - name: Update Last Tags File
        if: steps.compare.outputs.morphe_updated == 'true' || steps.compare.outputs.anddea_updated == 'true'
        run: |
          morphe_tag="${{ steps.compare.outputs.morphe_tag }}"
          anddea_tag="${{ steps.compare.outputs.anddea_tag }}"
          
          echo "📝 Updating last-tags.json..."
          echo "{\"morphe\": \"$morphe_tag\", \"anddea\": \"$anddea_tag\"}" > last-tags.json
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-tags.json
          git commit -m "chore: update last-tags to morphe=$morphe_tag anddea=$anddea_tag [skip ci]"
          git push
          
          echo "✅ last-tags.json updated and pushed"
      
      - name: Log Check Result
        if: steps.compare.outputs.morphe_updated == 'false' && steps.compare.outputs.anddea_updated == 'false'
        run: |
          echo "📭 No updates found. Skipping build."
          echo "Current tags:"
          echo "  - Morphe: ${{ steps.compare.outputs.morphe_tag }}"
          echo "  - Anddea: ${{ steps.compare.outputs.anddea_tag }}"
